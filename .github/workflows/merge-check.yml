name: Check Merge Fast-Forward Only

on:
  pull_request:
    branches-ignore:
      - 'backport*'
      - 'v1*'
      - 'v2*'

jobs:
  check_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "noreply@example.com"

      - name: Check merge --ff-only
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"
          if ! git merge-base --is-ancestor "refs/remotes/origin/${BASE_REF}" "refs/remotes/pull/${PR_NUMBER}/head"; then
            echo "::error::Pull request branch cannot be fast-forwarded from ${BASE_REF}. Rebase or merge the latest ${BASE_REF} first."
            exit 1
          fi
